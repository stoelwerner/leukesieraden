<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leuke Sieraden</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* 🌊 Achtergrond (wazig) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("./achtergrond.jpeg") center / cover no-repeat;
      filter: blur(4px);
      transform: scale(1.1);
      z-index: -2;
    }

    /* 🌸 Roze overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(248, 230, 235, 0.6);
      z-index: -1;
    }

    /* 📦 Content kaart */
    .card {
      max-width: 700px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.16);
    }

    .logo {
      max-width: 200px;
      width: 100%;
      height: auto;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      color: #5f4d53;
    }

    p {
      font-size: 18px;
      color: #6b5c61;
      margin: 8px 0;
    }

    .qr {
      margin-top: 24px;
    }

    .qr h2 {
      font-size: 22px;
      color: #5f4d53;
      margin-bottom: 12px;
    }

    .qr img {
      width: 170px;
      border-radius: 16px;
      background: #fff;
      padding: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 15px;
      color: #7a6a70;
    }

    /* 📱 Mobiel */
    @media (max-width: 600px) {
      .card {
        margin: 20px;
        padding: 20px;
      }

      .logo {
        max-width: 150px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 16px;
      }

      .qr h2 {
        font-size: 20px;
      }

      .qr img {
        width: 140px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <img src="./logo.png" alt="Leuke Sieraden logo" class="logo">

    <h1>Leuke Sieraden</h1>
    <p>Handgemaakt door Jaimie Stoel 💛</p>

    <div class="qr">
      <h2>Scan om ons te volgen</h2>
      <img src="./qr.png" alt="QR code WhatsApp kanaal">
      <p class="subtitle">Scan de QR-code om ons WhatsApp kanaal te bekijken ✨</p>
    </div>

  </div>

</body>
</html>
